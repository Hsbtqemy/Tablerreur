# Build Windows (installateurs + portable) et attache les artefacts à une Release GitHub.
# Déclencher : push d'un tag v* (ex. git push origin v0.1.4) OU publication d'une release depuis l'interface GitHub.

name: Release Windows

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Définir la version depuis le tag
        run: |
          if ("${{ github.event_name }}" -eq "release") {
            $tag = "${{ github.event.release.tag_name }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          $version = ($tag -replace '^v', '').Trim()
          if ($version -match '^\d+\.\d+$') {
            $version = "$version.0"
          }

          if (-not ($version -match '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$')) {
            throw "Tag invalide pour Tauri/Cargo: '$tag' -> '$version'. Attendu: vX.Y.Z (ex: v0.1.0)."
          }

          Write-Host "Event: ${{ github.event_name }}"
          Write-Host "Tag: $tag"
          Write-Host "Version semver: $version"

          (Get-Content src-tauri/tauri.conf.json -Raw) -replace '"version":\s*"[^"]*"', "`"version`": `"$version`"" | Set-Content src-tauri/tauri.conf.json -Encoding utf8
          (Get-Content src-tauri/Cargo.toml -Raw) -replace '(?m)^version = ".*"$', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml -Encoding utf8

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Installer Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: swatinem/rust-cache@v2

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer 7-Zip (pour exe portable)
        run: choco install 7zip -y

      - name: Dépendances npm
        run: npm ci

      - name: Dépendances Python (projet + sidecar web)
        run: |
          pip install -e ".[web]"
          pip install pyinstaller

      - name: Builder le sidecar Python
        run: python scripts/build_sidecar.py

      - name: Builder Tauri (NSIS + MSI)
        run: npm run tauri build

      - name: Builder le bundle portable (zip + exe)
        run: python scripts/build_portable_exe.py

      - name: Rassembler les artefacts pour la release
        run: |
          New-Item -ItemType Directory -Force -Path release_assets
          $b = "src-tauri/target/release/bundle"
          Get-ChildItem -Path "$b/nsis" -Recurse -Include *.exe | ForEach-Object { Copy-Item $_.FullName -Destination release_assets -Force }
          Get-ChildItem -Path "$b/msi" -Recurse -Include *.msi | ForEach-Object { Copy-Item $_.FullName -Destination release_assets -Force }
          Get-ChildItem -Path "$b/portable" -Include *.zip,*.exe | ForEach-Object { Copy-Item $_.FullName -Destination release_assets -Force }
          Get-ChildItem release_assets

      - name: Publier les artefacts sur la Release
        uses: softprops/action-gh-release@v2
        with:
          release_id: ${{ github.event_name == 'release' && github.event.release.id }}
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.release.tag_name }}
          name: Release ${{ github.event_name == 'push' && github.ref_name || github.event.release.tag_name }}
          files: release_assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

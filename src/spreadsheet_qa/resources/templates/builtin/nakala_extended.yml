# Tablerreur — NAKALA Extended overlay
# Valide les champs obligatoires ET recommandés d'un dépôt NAKALA.
# Fusionner sur un template générique via TemplateManager.
#
# Inventaire complet des champs NAKALA supportés :
#
# ── OBLIGATOIRES (préfixe nakala:) ──────────────────────────────────────────
#   nakala:type     — Type de ressource (vocabulaire COAR, 29 URIs)
#   nakala:title    — Titre (texte libre)
#   nakala:creator  — Créateur ("Nom, Prénom" ou "Anonyme")
#   nakala:created  — Date de création (W3C-DTF ou "Inconnue")
#   nakala:license  — Licence (vocabulaire NAKALA SPDX)
#
# ── RECOMMANDÉS / OPTIONNELS (préfixe dcterms:) ─────────────────────────────
#   dcterms:type          — Type (équivalent dcterms, même vocabulaire COAR)
#   dcterms:title         — Titre (équivalent dcterms)
#   dcterms:creator       — Créateur (équivalent dcterms, même format)
#   dcterms:created       — Date de création (équivalent dcterms, même format)
#   dcterms:license       — Licence (équivalent dcterms)
#   dcterms:description   — Description (texte long, multilignes)
#   dcterms:language      — Langue (ISO 639-3 : fra, eng, deu…)
#   dcterms:subject       — Mots-clés / sujets (liste séparée par |)
#   dcterms:publisher     — Éditeur (texte libre)
#   dcterms:contributor   — Contributeur ("Nom, Prénom" ou texte libre)
#   dcterms:rights        — Droits (texte libre)
#   dcterms:rightsHolder  — Titulaire des droits (texte libre)
#   dcterms:relation      — Relation vers d'autres données (URI ou texte libre)
#   dcterms:source        — Source (URI ou texte libre)
#   dcterms:spatial       — Couverture spatiale (texte libre, dcterms:Point/Box)
#   dcterms:available     — Date de disponibilité (W3C-DTF)
#   dcterms:modified      — Date de modification (W3C-DTF)
#   dcterms:format        — Format du fichier (type MIME : application/pdf…)
#   dcterms:abstract      — Résumé (texte long, multilignes)
#   dcterms:mediator      — Médiateur (texte libre, optionnel)
version: 1
id: nakala_extended
name: "NAKALA — Étendu"
description: "Colonnes obligatoires + recommandées pour un dépôt NAKALA (overlay sur Générique)"
scope: builtin
type: overlay

# Colonnes NAKALA obligatoires
required_columns:
  - "nakala:type"
  - "nakala:title"
  - "nakala:creator"
  - "nakala:created"
  - "nakala:license"

# Colonnes recommandées (pas d'erreur si absentes, mais les règles s'activent si présentes)
recommended_columns:
  - "dcterms:description"
  - "dcterms:language"
  - "dcterms:subject"
  - "dcterms:identifier"
  - "dcterms:relation"
  - "dcterms:type"
  - "dcterms:title"
  - "dcterms:creator"
  - "dcterms:created"
  - "dcterms:license"
  - "dcterms:publisher"
  - "dcterms:contributor"
  - "dcterms:rights"
  - "dcterms:rightsHolder"
  - "dcterms:source"
  - "dcterms:spatial"
  - "dcterms:available"
  - "dcterms:modified"
  - "dcterms:format"
  - "dcterms:abstract"
  - "dcterms:mediator"

rules:
  # Règles NAKALA spécifiques
  nakala.deposit_type:
    enabled: true
    severity: ERROR

  nakala.license:
    enabled: true
    severity: ERROR

  # nakala.created_format activé globalement ; désactivé colonne par colonne
  # pour les champs non-date (rule_overrides: nakala.created_format: enabled: false).
  nakala.created_format:
    enabled: true
    severity: ERROR

  nakala.language:
    enabled: true
    severity: WARNING

  # Hygiène générique (référence)
  generic.hygiene.leading_trailing_space:
    enabled: true
    severity: WARNING

  generic.pseudo_missing:
    enabled: true
    severity: WARNING

  generic.unexpected_multiline:
    enabled: true
    severity: WARNING

column_groups:
  # Colonnes de titres multilingues : title_fr, title_en, etc.
  "nakala:title_*":
    kind: free_text_short
    required: false
    rule_overrides:
      generic.unexpected_multiline:
        enabled: false

  # Colonnes de description multilingues
  "dcterms:description_*":
    kind: free_text_long
    multiline_ok: true
    required: false

  # Colonnes de mots-clés répétées : keywords_*_1, keywords_*_2…
  "keywords_*":
    kind: list
    list_separator: "|"
    rule_overrides:
      generic.unexpected_multiline:
        enabled: false

  # Colonnes identifiant / relation (format URI)
  "dcterms:identifier*":
    kind: structured
    regex: "^(https?://|ark:/|doi:|urn:).+"

  "dcterms:relation*":
    kind: structured
    regex: "^(https?://|ark:/|doi:|urn:).+"

columns:
  # ── CHAMPS OBLIGATOIRES (nakala:*) ────────────────────────────────────────

  "nakala:type":
    kind: controlled
    required: true
    # Repli hors-ligne : 29 URIs COAR (snapshot 2026-02)
    nakala_vocabulary: "datatypes"
    allowed_values:
      - "http://purl.org/coar/resource_type/c_c513"
      - "http://purl.org/coar/resource_type/c_12ce"
      - "http://purl.org/coar/resource_type/c_18cc"
      - "http://purl.org/coar/resource_type/c_6501"
      - "http://purl.org/coar/resource_type/c_6670"
      - "http://purl.org/coar/resource_type/c_c94f"
      - "http://purl.org/coar/resource_type/c_e059"
      - "http://purl.org/coar/resource_type/c_2f33"
      - "http://purl.org/coar/resource_type/c_12cd"
      - "http://purl.org/coar/resource_type/c_ddb1"
      - "http://purl.org/coar/resource_type/c_5ce6"
      - "http://purl.org/coar/resource_type/c_1843"
      - "http://purl.org/coar/resource_type/YC9F-HGCF"
      - "http://purl.org/coar/resource_type/F8RT-TJK0"
      - "http://purl.org/coar/resource_type/c_86bc"
      - "http://purl.org/coar/resource_type/c_ba08"
      - "http://purl.org/coar/resource_type/c_0040"
      - "http://purl.org/coar/resource_type/c_0857"
      - "http://purl.org/coar/resource_type/c_93fc"
      - "http://purl.org/coar/resource_type/c_2fe3"
      - "http://purl.org/coar/resource_type/c_816b"
      - "http://purl.org/coar/resource_type/c_efa0"
      - "http://purl.org/coar/resource_type/c_18cw"
      - "http://purl.org/coar/resource_type/NHD0-W6SY"
      - "http://purl.org/coar/resource_type/c_18cf"
      - "http://purl.org/coar/resource_type/c_46ec"
      - "http://purl.org/coar/resource_type/c_7ad9"
      - "http://purl.org/coar/resource_type/c_beb9"
      - "http://purl.org/coar/resource_type/c_e9a0"
    allowed_values_locked: true
    rule_overrides:
      nakala.deposit_type:
        enabled: true
      nakala.created_format:
        enabled: false

  "nakala:title":
    kind: free_text_short
    required: true
    rule_overrides:
      generic.pseudo_missing:
        enabled: true
        severity: ERROR
      nakala.created_format:
        enabled: false

  "nakala:creator":
    kind: structured
    required: true
    # Format : "Nom, Prénom" (optionnellement suivi d'un ORCID ou identifiant)
    regex: "^[^,]+,\\s*.+"
    pipe_in_cell_warning: true
    list_separator: "|"
    list_trim: true
    # "Anonyme" est accepté inconditionnellement (bypass regex)
    special_values: ["Anonyme"]
    rule_overrides:
      generic.unexpected_multiline:
        enabled: false
      nakala.created_format:
        enabled: false

  "nakala:created":
    kind: structured
    required: true
    # "Inconnue" est accepté inconditionnellement (bypass nakala.created_format)
    special_values: ["Inconnue"]
    rule_overrides:
      nakala.created_format:
        enabled: true

  "nakala:license":
    kind: controlled
    required: true
    nakala_vocabulary: "licenses"
    allowed_values_locked: true
    # NakalaClient valide dynamiquement (620 codes SPDX) quand disponible.
    rule_overrides:
      nakala.license:
        enabled: true
      nakala.created_format:
        enabled: false

  # ── ÉQUIVALENTS dcterms:* DES CHAMPS OBLIGATOIRES (optionnels) ───────────

  "dcterms:type":
    kind: controlled
    required: false
    # Même vocabulaire COAR que nakala:type ; règle deposit_type activée
    nakala_vocabulary: "datatypes"
    allowed_values:
      - "http://purl.org/coar/resource_type/c_c513"
      - "http://purl.org/coar/resource_type/c_12ce"
      - "http://purl.org/coar/resource_type/c_18cc"
      - "http://purl.org/coar/resource_type/c_6501"
      - "http://purl.org/coar/resource_type/c_6670"
      - "http://purl.org/coar/resource_type/c_c94f"
      - "http://purl.org/coar/resource_type/c_e059"
      - "http://purl.org/coar/resource_type/c_2f33"
      - "http://purl.org/coar/resource_type/c_12cd"
      - "http://purl.org/coar/resource_type/c_ddb1"
      - "http://purl.org/coar/resource_type/c_5ce6"
      - "http://purl.org/coar/resource_type/c_1843"
      - "http://purl.org/coar/resource_type/YC9F-HGCF"
      - "http://purl.org/coar/resource_type/F8RT-TJK0"
      - "http://purl.org/coar/resource_type/c_86bc"
      - "http://purl.org/coar/resource_type/c_ba08"
      - "http://purl.org/coar/resource_type/c_0040"
      - "http://purl.org/coar/resource_type/c_0857"
      - "http://purl.org/coar/resource_type/c_93fc"
      - "http://purl.org/coar/resource_type/c_2fe3"
      - "http://purl.org/coar/resource_type/c_816b"
      - "http://purl.org/coar/resource_type/c_efa0"
      - "http://purl.org/coar/resource_type/c_18cw"
      - "http://purl.org/coar/resource_type/NHD0-W6SY"
      - "http://purl.org/coar/resource_type/c_18cf"
      - "http://purl.org/coar/resource_type/c_46ec"
      - "http://purl.org/coar/resource_type/c_7ad9"
      - "http://purl.org/coar/resource_type/c_beb9"
      - "http://purl.org/coar/resource_type/c_e9a0"
    allowed_values_locked: true
    rule_overrides:
      nakala.deposit_type:
        enabled: true
      nakala.created_format:
        enabled: false

  "dcterms:title":
    kind: free_text_short
    required: false
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:creator":
    kind: structured
    required: false
    regex: "^[^,]+,\\s*.+"
    special_values: ["Anonyme"]
    list_separator: "|"
    list_trim: true
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:created":
    kind: structured
    required: false
    special_values: ["Inconnue"]
    rule_overrides:
      nakala.created_format:
        enabled: true

  "dcterms:license":
    kind: controlled
    required: false
    nakala_vocabulary: "licenses"
    allowed_values_locked: true
    rule_overrides:
      nakala.license:
        enabled: true
      nakala.created_format:
        enabled: false

  # ── CHAMPS RECOMMANDÉS (dcterms:*) ────────────────────────────────────────

  "dcterms:description":
    kind: free_text_long
    multiline_ok: true
    required: false
    # | autorisé comme contenu textuel dans les descriptions
    pipe_is_text: true
    rule_overrides:
      generic.unexpected_multiline:
        enabled: false
      nakala.created_format:
        enabled: false

  "dcterms:language":
    kind: controlled
    required: false
    # Codes ISO 639-3 (3 lettres : fra, eng, deu…)
    # NakalaClient valide dynamiquement (8039 codes) quand disponible.
    nakala_vocabulary: "languages"
    allowed_values_locked: true
    list_separator: "|"
    list_trim: true
    rule_overrides:
      nakala.language:
        enabled: true
      nakala.created_format:
        enabled: false

  "dcterms:subject":
    kind: list
    required: false
    list_separator: "|"
    list_trim: true
    pipe_in_cell_warning: true
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:publisher":
    kind: free_text_short
    required: false
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:contributor":
    kind: structured
    required: false
    # Même format que nakala:creator : "Nom, Prénom"
    regex: "^[^,]+,\\s*.+"
    special_values: ["Anonyme"]
    list_separator: "|"
    list_trim: true
    rule_overrides:
      generic.unexpected_multiline:
        enabled: false
      nakala.created_format:
        enabled: false

  "dcterms:rights":
    kind: free_text_short
    required: false
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:rightsHolder":
    kind: free_text_short
    required: false
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:relation":
    kind: free_text_short
    required: false
    # URI de préférence, texte libre accepté
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:source":
    kind: free_text_short
    required: false
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:spatial":
    kind: free_text_short
    required: false
    # Couverture spatiale — texte libre ou dcterms:Point/Box
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:available":
    kind: structured
    required: false
    # Date de disponibilité — format W3C-DTF
    regex: "^\\d{4}(-\\d{2}(-\\d{2})?)?$"
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:modified":
    kind: structured
    required: false
    # Date de modification — format W3C-DTF
    regex: "^\\d{4}(-\\d{2}(-\\d{2})?)?$"
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:format":
    kind: structured
    required: false
    # Type MIME : application/pdf, image/jpeg, text/csv, etc.
    regex: "^[a-z]+/[a-z0-9\\.\\-\\+]+$"
    rule_overrides:
      nakala.created_format:
        enabled: false

  "dcterms:abstract":
    kind: free_text_long
    multiline_ok: true
    required: false
    pipe_is_text: true
    rule_overrides:
      generic.unexpected_multiline:
        enabled: false
      nakala.created_format:
        enabled: false

  "dcterms:mediator":
    kind: free_text_short
    required: false
    # Médiateur — entité qui médiatise l'accès (ex. enseignant pour ressource pédagogique)
    rule_overrides:
      nakala.created_format:
        enabled: false

policies:
  warn_pipe_in_repeatable_fields: true
  allow_pipe_in_description: true
  recommend_split_to_repeated_columns: true

export:
  multivalues_mode: expanded
  list_separator: "|"

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tablerreur · Mapala — Démarrage</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .splash-titles {
      text-align: center;
      line-height: 1.2;
    }
    /* Tablerreur : bleu, titre principal */
    .title {
      display: block;
      font-size: 2.5rem;
      font-weight: 700;
      color: #2563eb;
      letter-spacing: -0.03em;
    }
    /* Mapala : vert accent, même dynamique mais bien distinct */
    .title-line {
      display: block;
      font-size: 2.2rem;
      font-weight: 700;
      color: #059669;
      letter-spacing: -0.03em;
      margin-top: 0.35em;
    }
    .subtitle {
      margin-top: 0.75rem;
      font-size: 1rem;
      color: #64748b;
      letter-spacing: 0.01em;
    }

    .spinner-wrap {
      margin: 2.25rem 0 1.75rem;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid #e2e8f0;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 0.9rem;
      color: #64748b;
    }

    .version {
      margin-top: 0.6rem;
      font-size: 0.75rem;
      color: #94a3b8;
    }

    @media (prefers-color-scheme: dark) {
      html, body { background: #0f172a; }
      .title { color: #93c5fd; }
      .title-line { color: #6ee7b7; }
      .subtitle, .status { color: #94a3b8; }
      .version { color: #475569; }
      .spinner { border-color: #334155; border-top-color: #3b82f6; }
    }
  </style>
</head>
<body>
  <h1 class="splash-titles">
    <span class="title">Tablerreur</span>
    <span class="title-line">Mapala</span>
  </h1>
  <p class="subtitle">Contrôle qualité et mapping de tableurs</p>
  <div class="spinner-wrap">
    <div class="spinner"></div>
  </div>
  <p class="status">Démarrage en cours…</p>
  <p class="version">v0.1.0</p>
</body>
</html>
